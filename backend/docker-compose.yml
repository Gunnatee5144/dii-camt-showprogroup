services:
  postgres:
    image: postgres:16-alpine
    container_name: showpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: showpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - showpro-postgres:/var/lib/postgresql/data

volumes:
  showpro-postgres:
